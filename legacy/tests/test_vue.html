<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Vue Test</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
    <div id="app">
        <h1>{{ message }}</h1>
        <button @click="count++">Count: {{ count }}</button>
    </div>
    
    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    message: 'Vue is working!',
                    count: 0
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
